services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - ${PRODUCTION_ENV_FILE:-.env.production}
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: sqlite:////app/data/app.db
      LOG_DIR: /app/logs
    volumes:
      - coin_bot_data:/app/data
      - coin_bot_logs:/app/logs
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  coin_bot_data:
  coin_bot_logs:
