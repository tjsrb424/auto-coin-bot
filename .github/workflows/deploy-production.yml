name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m unittest discover -s tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    environment: production
    steps:
      - name: Configure SSH
        id: deploy-config
        env:
          SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          SSH_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          SSH_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ]; then
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Lightsail deploy secrets are not configured. Tests ran, deploy skipped."
            exit 0
          fi
          echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Pull, rebuild, and restart
        if: steps.deploy-config.outputs.deploy_enabled == 'true'
        env:
          SSH_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          SSH_USER: ${{ secrets.LIGHTSAIL_USER }}
          APP_DIR: ${{ vars.LIGHTSAIL_APP_DIR || '/home/ubuntu/auto-coin-bot' }}
        run: |
          ssh -i ~/.ssh/lightsail_key "$SSH_USER@$SSH_HOST" "
            set -euo pipefail
            cd '$APP_DIR'
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            sudo python3 scripts/upsert_env_file.py .env.production \
              AUTO_MAX_OPEN_POSITION_COUNT=5 \
              AUTO_SELECTOR_MAX_OPEN_POSITIONS=5 \
              AUTO_SELECTOR_MAX_SWITCHES_PER_DAY=0 \
              AUTO_CAPITAL_ALLOCATOR_ENABLED=true \
              AUTO_MAX_NEW_ENTRIES_PER_TICK=2 \
              AUTO_SINGLE_POSITION_MAX_EXPOSURE_PCT=45 \
              AUTO_CASH_RESERVE_PCT=5 \
              AUTO_MIN_EXPECTED_EDGE_PCT=0.45 \
              AUTO_FEE_RATE=0.0005 \
              AUTO_SLIPPAGE_RATE=0.0005 \
              AUTO_EDGE_SAFETY_MARGIN_PCT=0.15 \
              AUTO_ORDER_RESERVATION_TTL_MINUTES=30 \
              AUTO_NEXT_ENTRY_TTL_MINUTES=360 \
              AUTO_CAPITAL_ALLOCATOR_LOCK_TTL_SECONDS=300 \
              AUTO_CAPITAL_SNAPSHOT_MAX_AGE_SECONDS=10 \
              LIVE_RECOVERY_EVENT_DEDUPE_SECONDS=300
            COMPOSE_PARALLEL_LIMIT=1 sudo docker compose --env-file .env.production build backend
            sudo docker compose --env-file .env.production up -d backend
            APP_COMMIT=\$(git rev-parse --short HEAD) COMPOSE_PARALLEL_LIMIT=1 sudo docker compose --env-file .env.production build frontend
            sudo docker compose --env-file .env.production up -d frontend
            sudo docker compose --env-file .env.production ps
          "

      - name: Health check
        if: steps.deploy-config.outputs.deploy_enabled == 'true'
        env:
          APP_URL: ${{ vars.PRODUCTION_APP_URL || 'http://43.201.162.191' }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error "$APP_URL/health"; then
              exit 0
            fi
            sleep 5
          done
          exit 1
